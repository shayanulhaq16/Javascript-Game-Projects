<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - by syan</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="images/tictactoe.png">

</head>

<body>

    <h1 class="name">TIC TAC TOE</h1>


    <div class="container">
        <div class="box-container">

            <div class="box box1" id="box1" onclick="game('box1')"></div>
            <div class="box box2" id="box2" onclick="game('box2')"></div>
            <div class="box box3" id="box3" onclick="game('box3')"></div>
        </div>
        <div class="box-container">

            <div class="box box4" id="box4" onclick="game('box4')"></div>
            <div class="box box5" id="box5" onclick="game('box5')"></div>
            <div class="box box6" id="box6" onclick="game('box6')"></div>
        </div>
        <div class="box-container">

            <div class="box box7" id="box7" onclick="game('box7')"></div>
            <div class="box box8" id="box8" onclick="game('box8')"></div>
            <div class="box box9" id="box9" onclick="game('box9')"></div>
        </div>
    </div>


    <h1 class="wining" id="wining"></h1>


    <script src="game.js"></script>
</body>

</html>
